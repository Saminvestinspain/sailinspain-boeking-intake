<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sail in Spain — Boeking intake</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:      #0d1821;
      --navy:      #1a2a3a;
      --card:      #1e3248;
      --border:    #2e4a64;
      --gold:      #c9a84c;
      --gold-l:    #e8c97a;
      --white:     #f5f5f0;
      --muted:     #8aa3b8;
      --input-bg:  #152231;
      --radius:    8px;
    }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--navy);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark i { color: var(--dark); font-size: 18px; }
    .header h1 { font-size: 15px; font-weight: 600; color: var(--white); }
    .header p  { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    /* ── Body ── */
    .body {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── Section ── */
    .section {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .section-head {
      padding: 0.75rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-head i   { color: var(--gold); font-size: 14px; }
    .section-head span {
      font-size: 11px; font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }
    .section-body {
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Grid ── */
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }

    @media (max-width: 600px) {
      .row2, .row3, .row4 { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 400px) {
      .row3, .row4 { grid-template-columns: 1fr 1fr; }
    }

    /* ── Fields ── */
    .field label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--input-bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 14px;
      color: var(--white);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--gold); }
    .field select { cursor: pointer; }
    .field select option { background: var(--navy); }
    .field textarea { resize: vertical; min-height: 64px; }

    /* ── Pills ── */
    .pill-group { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border: 0.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      background: var(--input-bg);
      -webkit-tap-highlight-color: transparent;
    }
    .pill:hover { border-color: var(--gold); color: var(--white); }
    .pill.on {
      border-color: var(--gold);
      background: rgba(201,168,76,0.13);
      color: var(--gold-l);
    }
    .pill input { display: none; }

    /* ── Days info ── */
    .days-info {
      font-size: 12px;
      color: var(--gold-l);
      background: rgba(201,168,76,0.08);
      border: 0.5px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      padding: 6px 10px;
      display: none;
    }

    /* ── Button ── */
    .btn-generate, .btn-submit {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-generate { background: var(--gold); color: var(--dark); }
    .btn-submit   { background: #2ecc71; color: #fff; margin-top: 4px; }
    .btn-submit:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
    .btn-generate:hover, .btn-submit:hover  { opacity: 0.88; }
    .btn-generate:active, .btn-submit:active { transform: scale(0.98); }

    /* ── Status message ── */
    .submit-status {
      text-align: center;
      padding: 12px;
      border-radius: var(--radius);
      font-size: 14px;
      display: none;
    }
    .submit-status.success {
      background: rgba(46,204,113,0.12);
      border: 1px solid rgba(46,204,113,0.4);
      color: #2ecc71;
      display: block;
    }
    .submit-status.error {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.4);
      color: #e74c3c;
      display: block;
    }

    /* ── Output ── */
    .output-wrap {
      background: var(--navy);
      border: 0.5px solid var(--gold);
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    .output-head {
      padding: 0.75rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .output-head span {
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .btn-copy {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy:hover { border-color: var(--gold); color: var(--gold); }
    .output-pre {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      line-height: 1.8;
      color: var(--white);
      padding: 1.25rem;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--input-bg);
    }

    /* ── Hidden ── */
    #catering-section { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-mark"><i class="fa-solid fa-sailboat"></i></div>
    <div>
      <h1>Sail in Spain — Boeking intake</h1>
      <p>Vul alle gegevens in en druk onderaan op "Genereer contractinfo" en plak deze naar Niels of Sam</p>
    </div>
  </div>

  <div class="body">

    <!-- Klantgegevens -->
    <div class="section">
      <div class="section-head"><i class="fa-solid fa-user"></i><span>Klantgegevens</span></div>
      <div class="section-body">
        <div class="row2">
          <div class="field"><label>Naam</label><input type="text" id="name" placeholder="Voornaam Achternaam" autocomplete="off"></div>
          <div class="field"><label>ID / Paspoortnummer</label><input type="text" id="idnr" placeholder="bv. 554812612" autocomplete="off"></div>
        </div>
        <div class="field"><label>Adres</label><input type="text" id="address" placeholder="Straat, postcode, stad, land" autocomplete="off"></div>
        <div class="row2">
          <div class="field"><label>Leeftijden gasten</label><input type="text" id="ages" placeholder="bv. 35, 38, 12, 10" autocomplete="off"></div>
          <div class="field">
            <label>Catering gewenst?</label>
            <div class="pill-group" id="cat-grp">
              <label class="pill" onclick="setPill('cat','ja',this)"><input type="radio" name="cat" value="ja"> Ja</label>
              <label class="pill" onclick="setPill('cat','nee',this)"><input type="radio" name="cat" value="nee"> Nee</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Charter details -->
    <div class="section">
      <div class="section-head"><i class="fa-solid fa-calendar-days"></i><span>Charter details</span></div>
      <div class="section-body">
        <div class="row2">
          <div class="field">
            <label>Vertrekhaven</label>
            <div class="pill-group" id="port-grp">
              <label class="pill" onclick="setPill('port','Sotogrande',this)"><input type="radio" name="port" value="Sotogrande"> Sotogrande</label>
              <label class="pill" onclick="setPill('port','Puerto Banús',this)"><input type="radio" name="port" value="Puerto Banús"> Puerto Banús</label>
            </div>
          </div>
          <div class="field"><label>Aantal gasten</label><input type="number" id="guests" min="1" max="12" placeholder="4"></div>
        </div>
        <div class="row4">
          <div class="field"><label>Startdatum</label><input type="date" id="date-from" oninput="calcDays()"></div>
          <div class="field"><label>Einddatum</label><input type="date" id="date-to" oninput="calcDays()"></div>
          <div class="field"><label>Starttijd</label><input type="time" id="tstart" value="10:00"></div>
          <div class="field"><label>Eindtijd</label><input type="time" id="tend" value="18:00"></div>
        </div>
        <div class="days-info" id="days-info"></div>
      </div>
    </div>

    <!-- Prijs & betaling -->
    <div class="section">
      <div class="section-head"><i class="fa-solid fa-euro-sign"></i><span>Prijs & betaling</span></div>
      <div class="section-body">
        <div class="row3">
          <div class="field"><label>Basisprijs (€)</label><input type="number" id="base" placeholder="3600"></div>
          <div class="field"><label>Korting</label><input type="text" id="discount" placeholder="bv. 50%"></div>
          <div class="field"><label>Totaal incl. BTW (€)</label><input type="number" id="total" placeholder="2500"></div>
        </div>
        <div class="row3">
          <div class="field"><label>Crew cost (€)</label><input type="number" id="crew" placeholder="500"></div>
          <div class="field"><label>Catering cost (€)</label><input type="number" id="catcost" placeholder="200"></div>
          <div class="field"><label>Waarborg (€)</label><input type="number" id="deposit" value="0"></div>
        </div>
      </div>
    </div>

    <!-- Catering & dranken -->
    <div class="section" id="catering-section">
      <div class="section-head"><i class="fa-solid fa-utensils"></i><span>Catering & dranken</span></div>
      <div class="section-body">
        <div class="field">
          <label>Gerechten</label>
          <div class="pill-group" id="food-grp">
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Mediterranean breakfast board"> Ontbijtboard</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Chicken salad"> Kippensalade</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Pasta deluxe (prawns)"> Pasta deluxe</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Paella"> Paella</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Tapas board – luxury"> Tapas luxe</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Fresh Tortilla"> Tortilla</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Tiramisu"> Tiramisu</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Fresh fruit"> Vers fruit</label>
          </div>
        </div>
        <div class="field">
          <label>Alcoholische dranken (optioneel)</label>
          <div class="pill-group" id="drinks-grp">
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Wine"> Wijn</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Cava"> Cava</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Champagne"> Champagne</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Gin & tonic"> Gin & tonic</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Vodka + fresh orange"> Vodka OJ</label>
            <label class="pill" onclick="togCb(this)"><input type="checkbox" value="Mojito"> Mojito</label>
          </div>
        </div>
        <div class="row2">
          <div class="field"><label>Wijn detail (soort + flessen)</label><input type="text" id="wine" placeholder="bv. 2x Rosé, 1x Wit"></div>
          <div class="field"><label>Cava / Champagne (flessen)</label><input type="text" id="bubbly" placeholder="bv. 2x Cava"></div>
        </div>
        <div class="field">
          <label>Speciale verzoeken / menu afspraken</label>
          <textarea id="special" placeholder="bv. Menu as discussed with Gunther, allergiëen..."></textarea>
        </div>
      </div>
    </div>

    <!-- Interne notities -->
    <div class="section">
      <div class="section-head"><i class="fa-solid fa-note-sticky"></i><span>Interne notities</span></div>
      <div class="section-body">
        <div class="field">
          <label>Niet zichtbaar in output — enkel intern</label>
          <textarea id="notes" placeholder="bv. vaste klant, bijzondere wensen, follow-up nodig..."></textarea>
        </div>
      </div>
    </div>

    <button class="btn-generate" onclick="generate()">
      <i class="fa-solid fa-file-lines"></i> Genereer contractinfo
    </button>

    <div class="output-wrap" id="out-wrap">
      <div class="output-head">
        <span><i class="fa-solid fa-check" style="margin-right:5px"></i>Klaar — controleer en verzend</span>
        <button class="btn-copy" onclick="doCopy()"><i class="fa-solid fa-copy"></i> Kopieer</button>
      </div>
      <pre class="output-pre" id="out-pre"></pre>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="submitToSheet()" style="display:none">
      <i class="fa-solid fa-paper-plane"></i> Verzend boeking
    </button>
    <div class="submit-status" id="submit-status"></div>

  </div>

  <script>
    function setPill(name, val, el) {
      document.querySelectorAll('[name="' + name + '"]').forEach(r => r.closest('.pill').classList.remove('on'));
      el.classList.add('on');
      if (name === 'cat') {
        document.getElementById('catering-section').style.display = val === 'ja' ? 'block' : 'none';
      }
    }

    function togCb(el) {
      el.classList.toggle('on');
    }

    function getChecked(id) {
      return Array.from(document.querySelectorAll('#' + id + ' input[type=checkbox]'))
        .filter(c => c.closest('.pill').classList.contains('on'))
        .map(c => c.value);
    }

    function getRadio(name) {
      const el = document.querySelector('#' + name + '-grp .pill.on input');
      return el ? el.value : '';
    }

    function fmtDate(d) {
      if (!d) return '';
      const p = d.split('-');
      return p[2] + '/' + p[1] + '/' + p[0];
    }

    function calcDays() {
      const from = document.getElementById('date-from').value;
      const to   = document.getElementById('date-to').value;
      const info = document.getElementById('days-info');
      if (from && to) {
        const diff = Math.round((new Date(to) - new Date(from)) / 86400000);
        if (diff > 0) {
          info.textContent = diff === 1
            ? '1 dag charter: ' + fmtDate(from)
            : diff + ' dagen charter: ' + fmtDate(from) + ' t/m ' + fmtDate(to);
          info.style.display = 'block';
        } else {
          info.style.display = 'none';
        }
      } else if (from) {
        info.textContent = 'Dag charter: ' + fmtDate(from);
        info.style.display = 'block';
      } else {
        info.style.display = 'none';
      }
    }

    function generate() {
      const name    = document.getElementById('name').value    || '[NAAM]';
      const idnr    = document.getElementById('idnr').value    || '[ID/PASPOORT]';
      const address = document.getElementById('address').value || '[ADRES]';
      const ages    = document.getElementById('ages').value;
      const from    = document.getElementById('date-from').value;
      const to      = document.getElementById('date-to').value;
      const port    = getRadio('port') || '[VERTREKHAVEN]';
      const ts      = document.getElementById('tstart').value  || '10:00';
      const te      = document.getElementById('tend').value    || '18:00';
      const guests  = document.getElementById('guests').value  || '[AANTAL]';
      const base    = document.getElementById('base').value;
      const disc    = document.getElementById('discount').value;
      const total   = document.getElementById('total').value;
      const crew    = document.getElementById('crew').value;
      const catcost = document.getElementById('catcost').value;
      const dep     = document.getElementById('deposit').value || '0';
      const catYN   = getRadio('cat');
      const foods   = getChecked('food-grp');
      const drinks  = getChecked('drinks-grp');
      const wine    = document.getElementById('wine').value;
      const bubbly  = document.getElementById('bubbly').value;
      const special = document.getElementById('special').value;

      let dateStr = '[DATUM]';
      if (from && to && from !== to) {
        const diff = Math.round((new Date(to) - new Date(from)) / 86400000);
        if (diff > 0) dateStr = fmtDate(from) + ' t/m ' + fmtDate(to) + ' (' + diff + ' ' + (diff === 1 ? 'dag' : 'dagen') + ')';
        else dateStr = fmtDate(from);
      } else if (from) {
        dateStr = fmtDate(from);
      }

      let price = total ? '€ ' + total + ' incl. BTW' : '[PRIJS]';
      if (base && disc && total) {
        price = '€ ' + base + ' – ' + disc + ' korting';
        if (crew)    price += ' + €' + crew + ' crew';
        if (catcost) price += ' + €' + catcost + ' catering';
        price += ' = €' + total + ' incl. BTW';
      }

      let o = '=== SAIL IN SPAIN — CONTRACTGEGEVENS ===\n';
      o += 'Opgemaakt: ' + new Date().toLocaleDateString('nl-BE') + '\n\n';
      o += '--- 1. KLANT ---\n';
      o += 'Naam:          ' + name + '\n';
      o += 'Adres:         ' + address + '\n';
      o += 'ID/Paspoort:   ' + idnr + '\n';
      if (ages) o += 'Leeftijden:    ' + ages + '\n';
      o += '\n--- 2. CHARTER ---\n';
      o += 'Periode:       ' + dateStr + '\n';
      o += 'Tijdstip:      ' + ts + ' – ' + te + '\n';
      o += 'Vertrekhaven:  ' + port + '\n';
      o += 'Gasten:        ' + guests + '\n';
      o += '\n--- 3. PRIJS & BETALING ---\n';
      o += 'Totaalprijs:   ' + price + '\n';
      o += 'Waarborg:      €' + dep + '\n';
      o += '\n--- 4. CATERING & DRANKEN ---\n';
      if (catYN === 'nee') {
        o += 'Catering:      Niet gewenst\n';
      } else if (catYN === 'ja') {
        o += 'Catering:      Ja\n';
        if (foods.length)  o += 'Gerechten:     ' + foods.join(', ') + '\n';
        if (drinks.length) {
          o += 'Alcohol:       ' + drinks.join(', ') + '\n';
          if (wine)   o += 'Wijn detail:   ' + wine + '\n';
          if (bubbly) o += 'Cava/Champ.:   ' + bubbly + '\n';
        } else {
          o += 'Alcohol:       Niet gewenst\n';
        }
        if (special) o += 'Speciale wens: ' + special + '\n';
      } else {
        o += 'Catering:      [NOG IN TE VULLEN]\n';
      }
      o += '\n--- STANDAARD CLAUSULES ---\n';
      o += '• Geen huisdieren toegelaten\n';
      o += '• Frisdranken & snacks (chips, olijven, nootjes) inbegrepen\n';
      o += '• Catering en alcoholische dranken optioneel\n';
      o += '• Dinghy service inbegrepen (donut & banaan)\n';

      document.getElementById('out-pre').textContent = o;
      const wrap = document.getElementById('out-wrap');
      wrap.style.display = 'block';
      document.getElementById('btn-submit').style.display = 'flex';
      document.getElementById('submit-status').className = 'submit-status';
      document.getElementById('submit-status').style.display = 'none';
      setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }

    function doCopy() {
      const text = document.getElementById('out-pre').textContent;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => showCopied());
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showCopied();
      }
    }

    function showCopied() {
      const btn = document.querySelector('.btn-copy');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Gekopieerd!';
      setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-copy"></i> Kopieer'; }, 2000);
    }

    // ── Verzend naar Google Sheets ──
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyL6zkSubGeKpEsVlZAdVWbBg_RePKGggPj7US-ZjQ0whUelexHXhnGNEsxS871vjIV/exec';

    function submitToSheet() {
      const btn = document.getElementById('btn-submit');
      const status = document.getElementById('submit-status');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verzenden...';

      const data = {
        name:      document.getElementById('name').value,
        idnr:      document.getElementById('idnr').value,
        address:   document.getElementById('address').value,
        ages:      document.getElementById('ages').value,
        port:      getRadio('port'),
        guests:    document.getElementById('guests').value,
        dateFrom:  document.getElementById('date-from').value,
        dateTo:    document.getElementById('date-to').value,
        timeStart: document.getElementById('tstart').value,
        timeEnd:   document.getElementById('tend').value,
        base:      document.getElementById('base').value,
        discount:  document.getElementById('discount').value,
        total:     document.getElementById('total').value,
        crew:      document.getElementById('crew').value,
        catcost:   document.getElementById('catcost').value,
        deposit:   document.getElementById('deposit').value,
        catering:  getRadio('cat'),
        foods:     getChecked('food-grp').join(', '),
        drinks:    getChecked('drinks-grp').join(', '),
        wine:      document.getElementById('wine').value,
        bubbly:    document.getElementById('bubbly').value,
        special:   document.getElementById('special').value,
        notes:     document.getElementById('notes').value
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(() => {
        status.className = 'submit-status success';
        status.innerHTML = '<i class="fa-solid fa-check-circle"></i> Boeking verzonden! Data staat in Google Sheets en e-mail is verstuurd.';
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Verzonden!';
        btn.style.background = '#27ae60';
      })
      .catch(() => {
        status.className = 'submit-status error';
        status.innerHTML = '<i class="fa-solid fa-exclamation-circle"></i> Verzenden mislukt. Controleer je internetverbinding.';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Verzend boeking';
      });
    }
  </script>
</body>
</html>
